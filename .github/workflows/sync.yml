name: Sync Aegis Rules

on:
  schedule:
    - cron: "0 0 */1 * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Sync and Fix Rules
        run: |
          # 1. 增量克隆与同步 (不拉取删除)
          git clone --depth=1 https://github.com/Thoseyearsbrian/Aegis tmp_repo
          mkdir -p Thoseyearsbrian/rules
          rsync -avu tmp_repo/rules/ Thoseyearsbrian/rules/
          rm -rf tmp_repo

          # 2. 自动补全 /32 掩码并去重
          find Thoseyearsbrian/rules -type f \( -name "*.list" -o -name "*.txt" \) | while read -r file; do
            sed -i -E 's/(IP-CIDR,[0-9]{1,3}(\.[0-9]{1,3}){3})([,[:space:]]|$)/\1\/32\3/g' "$file"
            sed -i 's/\/32\/32/\/32/g' "$file"
          done

      - name: Push Changes
        run: |
          git config user.name "[bot]"
          git config user.email "[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || (git commit -m "Auto-sync rules" && git push)
